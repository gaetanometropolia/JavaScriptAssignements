<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MODULE 1 EX 2</title>
</head>
<body>
<p id="Target"></p>

<script>
    "use strict";
    // Write a program that prompts for user's name and then greets the user. Print the result to the HTML document: Hello, Name! (2p)
    const name=prompt("Type your name")
    document.querySelector("#Target").innerHTML= (`Hello, ${name}`);
</script>
</body>
</html>
